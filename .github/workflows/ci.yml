name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Configure git identity
        # Required so the git-committer integration tests can commit.
        run: |
          git config --global user.name  "ci-runner"
          git config --global user.email "ci@watcher-on-the-wall.invalid"
          git config --global init.defaultBranch main

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        # Non-blocking: current advisories are transitive (hono via @modelcontextprotocol/sdk,
        # @anthropic-ai/sdk via claude-agent-sdk) with no direct fix available.
        run: pnpm audit --prod || true

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test

  package:
    name: package (smoke)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Pack
        run: pnpm pack
      - name: Verify CLI binary is executable
        run: |
          node dist/cli/index.js --version
          node dist/cli/index.js --help
