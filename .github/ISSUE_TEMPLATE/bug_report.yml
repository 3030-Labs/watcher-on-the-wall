name: Bug report
description: Something in watcher-on-the-wall is broken, regressed, or behaves unexpectedly.
title: "[bug] "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Please **do not file security vulnerabilities here** — email
        `security@3030labs.io` instead. See [SECURITY.md](../../SECURITY.md).

        For everything else, fill out the fields below. The more you give us, the
        faster we can reproduce and fix.
  - type: input
    id: wotw_version
    attributes:
      label: wotw version
      description: Output of `wotw --version`.
      placeholder: "0.8.3"
    validations:
      required: true
  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.16.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS arm64 (Apple Silicon)
        - macOS amd64 (Intel)
        - Linux amd64
        - Linux arm64
        - Windows amd64
        - WSL2 (specify distro in OS detail)
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: os_detail
    attributes:
      label: OS detail
      description: Distribution and version. Example "Ubuntu 24.04", "macOS 15.1", "Windows 11 24H2".
      placeholder: "Ubuntu 24.04 on WSL2"
    validations:
      required: false
  - type: dropdown
    id: runtime
    attributes:
      label: LLM runtime
      description: Which provider is the daemon configured to use?
      options:
        - Claude Code CLI (subscription / free runtime)
        - Anthropic API (BYO key)
        - OpenAI API (BYO key)
        - Gemini API (BYO key)
        - Ollama (local)
        - Multiple / mixed (describe below)
        - Not yet configured
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: One-paragraph description of the bug.
      placeholder: "wotw start exits immediately with EADDRINUSE on port 4317, but no other process holds that port."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Be specific. Include exact commands.
      placeholder: |
        1. `wotw init` against a fresh Obsidian vault
        2. `wotw start`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste from `~/.wotw/daemon.log` (the last ~50 lines around the failure)
        OR the terminal output of the failing command. Use a fenced code block.

        **DO NOT paste your Anthropic / OpenAI / Gemini API keys** or bearer tokens.
        Redact any `wotw_<...>` tokens.
      render: shell
    validations:
      required: false
  - type: textarea
    id: config
    attributes:
      label: Relevant config (redacted)
      description: Paste only the relevant sections of `wotw.config.yaml`. Redact secrets.
      render: yaml
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-submit checklist
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have removed API keys, tokens, and other secrets from the report.
          required: true
        - label: I understand this is a community-supported project and a fix is not guaranteed within a specific timeframe.
          required: true
